name: Link Check

on:
  # 1) On every PR that touches JSON files (PR mode)
  pull_request:
    paths:
      - "collections/**/*.json"
      - "indicators/**/*.json"

  # 2) Full audit twice a month (1st & 15th) + manual trigger
  schedule:
    - cron: "0 0 1,15 * *"
  workflow_dispatch:

jobs:
  # ── PR Mode ─────────────────────────────────────────────────────────────────
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for changed-files action

      - name: Get changed JSON files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            collections/**/*.json
            indicators/**/*.json

      - name: Set up Python
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: steps.changed-files.outputs.any_changed == 'true'
        run: pip install requests

      - name: Run link checker (PR mode)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          python .github/link_checker.py \
            --files ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Upload HTML report artifact
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: link-check-pr-report
          path: .github/link_check_report.html

  # ── Full Audit Mode ───────────────────────────────────────────────────────────
    full-audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to results_ci_checks branch
    steps:
      - name: Checkout main code
        uses: actions/checkout@v4

      - name: Checkout history branch into health_history/
        uses: actions/checkout@v4
        with:
          ref: results_ci_checks
          path: health_history
        continue-on-error: true   # branch may not exist on first run

      - name: Create history branch if missing
        run: |
          if [ ! -d health_history/.git ]; then
            mkdir -p health_history
            cd health_history
            git init -b results_ci_checks
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r .github/requirements.txt   # adjust if needed

      - name: Run full link audit
        env:
          FULL_AUDIT: "1"
        run: python .github/link_checker_pt2.py

      - name: Commit new health report
        if: always()   # commit even if the script exited with failure
        run: |
          cd health_history
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health_report_*.json
          if git diff --staged --quiet; then
            echo "No new report to commit."
          else
            git commit -m "Health report: $(date -u +%Y-%m-%d)"
            git push origin results_ci_checks
          fi

