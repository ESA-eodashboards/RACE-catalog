name: Link Checker

on:
  pull_request:
    branches: [main]
  schedule:
    # Full audit on the 1st and 15th of every month at 00:00 UTC
    - cron: '0 0 1,15 * *'
  workflow_dispatch:  # manual trigger for full audit

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # changed-files needs history to diff against the base branch
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # ---------- PR MODE ----------
      - name: Get changed JSON files (PR mode)
        if: github.event_name == 'pull_request'
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: |
            collections/**/*.json
            indicators/**/*.json

      - name: Run link checker on changed files (PR mode)
        if: github.event_name == 'pull_request'
        run: |
          if [ "${{ steps.changed.outputs.any_changed }}" = "true" ]; then
            echo "Changed files: ${{ steps.changed.outputs.all_changed_files }}"
            python .guthub/link_checker.py --files ${{ steps.changed.outputs.all_changed_files }}
          else
            echo "No relevant JSON files changed — skipping link check."
          fi

      # ---------- FULL AUDIT MODE ----------
      - name: Run full audit (scheduled / manual)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python .github/link_checker.py

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: .github/results_link_checker.html
          if-no-files-found: ignore
